<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Complete — DS-MOZ Intelligence</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir Next', 'Avenir', 'Segoe UI', Helvetica Neue, Arial, sans-serif;
      background: #060E10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 16px 56px rgba(0,0,0,0.6);
      text-align: center;
    }

    .brand {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #FF5E00;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 3rem;
      color: #3DD68C;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0A1C20;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.875rem;
      color: #5A8A90;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">DS-MOZ Intelligence</div>
    <div class="icon"><i class="ph-light ph-check-circle"></i></div>
    <h1>Registration Complete</h1>
    <p>
      Your account has been created. <strong style="color:#0A1C20">Check your email</strong> for your credentials and a link to set up your portal.<br><br>
      The email contains your Client ID, Client Secret, and step-by-step setup instructions for Claude Desktop and Cursor.
    </p>
  </div>
</body>
</html>
