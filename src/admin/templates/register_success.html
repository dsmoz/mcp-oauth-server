<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Submitted — DS-MOZ MCP OAuth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .brand {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .brand span { color: #a78bfa; }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">DS-MOZ <span>MCP OAuth</span></div>
    <div class="icon">✅</div>
    <h1>Request Submitted</h1>
    <p>
      Your access request has been received.<br>
      You will be contacted once it has been reviewed.
    </p>
  </div>
</body>
</html>
