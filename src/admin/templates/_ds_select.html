<style>
/* ── ds-select: shared dropdown component (auto-enhances <select class="ds-select">) ── */
.ds-select-wrap { position: relative; display: inline-block; font-family: inherit; }
.ds-select-wrap > select.ds-select { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
.ds-select-btn {
  display: inline-flex; align-items: center; gap: 8px;
  width: 100%; min-height: 38px;
  padding: 8px 32px 8px 12px;
  background: var(--bg-card, #1a2330);
  color: var(--text-h, var(--fg-1, #e8eef5));
  border: 1px solid var(--border, var(--line-2, #2a3441));
  border-radius: 8px;
  font: inherit; font-size: 0.875rem; line-height: 1.2;
  text-align: left; cursor: pointer;
  position: relative;
  transition: border-color 0.12s, background 0.12s;
}
.ds-select-btn:hover { border-color: var(--accent, #ff5e00); }
.ds-select-btn:focus-visible { outline: 2px solid var(--accent, #ff5e00); outline-offset: 1px; border-color: var(--accent, #ff5e00); }
.ds-select-wrap[data-open="true"] .ds-select-btn { border-color: var(--accent, #ff5e00); }
.ds-select-btn::after {
  content: ''; position: absolute; right: 10px; top: 50%;
  width: 8px; height: 8px;
  border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
  transform: translateY(-65%) rotate(45deg);
  opacity: 0.55; pointer-events: none;
}
.ds-select-wrap[data-open="true"] .ds-select-btn::after {
  transform: translateY(-30%) rotate(-135deg);
}
.ds-select-icon, .ds-select-option-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; flex-shrink: 0;
  color: var(--accent, #ff5e00);
}
.ds-select-icon svg, .ds-select-option-icon svg { width: 16px; height: 16px; }
.ds-select-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ds-select-menu {
  position: absolute; z-index: 200;
  top: calc(100% + 4px); left: 0; min-width: 100%;
  max-height: 320px; overflow-y: auto;
  background: var(--bg-card, #1a2330);
  border: 1px solid var(--border, var(--line-2, #2a3441));
  border-radius: 8px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.45);
  padding: 4px;
  display: none;
}
.ds-select-wrap[data-open="true"] .ds-select-menu { display: block; }
.ds-select-option {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 0.875rem;
  color: var(--text-h, var(--fg-1, #e8eef5));
  cursor: pointer;
  white-space: nowrap;
}
.ds-select-option:hover, .ds-select-option[data-active="true"] {
  background: rgba(255, 94, 0, 0.10);
  color: var(--accent, #ff5e00);
}
.ds-select-option[aria-selected="true"] {
  background: rgba(255, 94, 0, 0.15);
  font-weight: 600;
}
.ds-select-option[aria-selected="true"] .ds-select-option-icon { color: var(--accent, #ff5e00); }
.ds-select-option-check { margin-left: auto; opacity: 0; color: var(--accent, #ff5e00); width: 14px; height: 14px; flex-shrink: 0; }
.ds-select-option-check svg { width: 14px; height: 14px; }
.ds-select-option[aria-selected="true"] .ds-select-option-check { opacity: 1; }

.ds-select-wrap.ds-select-compact .ds-select-btn {
  min-height: 30px; padding: 4px 28px 4px 8px; font-size: 0.78rem;
}
.ds-select-wrap.ds-select-compact .ds-select-icon { width: 14px; height: 14px; }
.ds-select-wrap.ds-select-compact .ds-select-icon svg { width: 13px; height: 13px; }

.ds-select-wrap[data-disabled="true"] .ds-select-btn {
  opacity: 0.5; cursor: not-allowed; pointer-events: none;
}
</style>

<script>
(function () {
  if (window.__dsSelectInstalled) return;
  window.__dsSelectInstalled = true;

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const XLINK_NS = 'http://www.w3.org/1999/xlink';
  // Allowlist of known sprite icon ids
  const ICON_NAMES = new Set([
    'gift','feather','tag','star','flame','zap','shield','crown','check','dot',
    'list','globe','coin','toggle','language',
  ]);

  function makeIconSvg(name) {
    if (!name || !ICON_NAMES.has(name)) return null;
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('aria-hidden', 'true');
    const use = document.createElementNS(SVG_NS, 'use');
    use.setAttribute('href', '#dssIcon-' + name);
    use.setAttributeNS(XLINK_NS, 'xlink:href', '#dssIcon-' + name);
    svg.appendChild(use);
    return svg;
  }

  function setIconInto(slot, name) {
    while (slot.firstChild) slot.removeChild(slot.firstChild);
    const svg = makeIconSvg(name);
    if (svg) { slot.appendChild(svg); slot.style.display = ''; }
    else { slot.style.display = 'none'; }
  }

  function uid() { return 'dss-' + Math.random().toString(36).slice(2, 9); }

  function enhance(select) {
    if (select.dataset.dssEnhanced === '1') return;
    select.dataset.dssEnhanced = '1';

    const wrap = document.createElement('div');
    wrap.className = 'ds-select-wrap';
    if (select.classList.contains('ds-select-compact') || select.dataset.compact === '1') {
      wrap.classList.add('ds-select-compact');
    }
    if (select.disabled) wrap.dataset.disabled = 'true';
    if (select.style.width) wrap.style.width = select.style.width;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ds-select-btn';
    btn.setAttribute('role', 'combobox');
    btn.setAttribute('aria-haspopup', 'listbox');
    btn.setAttribute('aria-expanded', 'false');
    const menuId = uid();
    btn.setAttribute('aria-controls', menuId);

    const iconSlot = document.createElement('span');
    iconSlot.className = 'ds-select-icon';
    const labelSlot = document.createElement('span');
    labelSlot.className = 'ds-select-label';
    btn.append(iconSlot, labelSlot);

    const menu = document.createElement('div');
    menu.className = 'ds-select-menu';
    menu.id = menuId;
    menu.setAttribute('role', 'listbox');

    function buildMenu() {
      while (menu.firstChild) menu.removeChild(menu.firstChild);
      Array.from(select.options).forEach((opt, idx) => {
        const row = document.createElement('div');
        row.className = 'ds-select-option';
        row.setAttribute('role', 'option');
        row.dataset.value = opt.value;
        row.dataset.idx = String(idx);
        const oIcon = document.createElement('span');
        oIcon.className = 'ds-select-option-icon';
        setIconInto(oIcon, opt.dataset.icon || '');
        const oLabel = document.createElement('span');
        oLabel.className = 'ds-select-label';
        oLabel.textContent = opt.textContent.trim();
        const check = document.createElement('span');
        check.className = 'ds-select-option-check';
        const checkSvg = makeIconSvg('check');
        if (checkSvg) check.appendChild(checkSvg);
        row.append(oIcon, oLabel, check);
        if (opt.selected) row.setAttribute('aria-selected', 'true');
        row.addEventListener('mouseenter', () => setActive(idx));
        row.addEventListener('click', (e) => { e.preventDefault(); pick(idx); });
        menu.appendChild(row);
      });
    }

    function syncBtn() {
      const opt = select.options[select.selectedIndex];
      if (!opt) { labelSlot.textContent = ''; setIconInto(iconSlot, ''); return; }
      labelSlot.textContent = opt.textContent.trim();
      setIconInto(iconSlot, opt.dataset.icon || '');
    }

    function setActive(idx) {
      menu.querySelectorAll('[data-active="true"]').forEach(r => r.removeAttribute('data-active'));
      const row = menu.querySelector('.ds-select-option[data-idx="' + idx + '"]');
      if (row) row.dataset.active = 'true';
    }

    function pick(idx) {
      if (idx < 0 || idx >= select.options.length) return;
      if (select.selectedIndex !== idx) {
        select.selectedIndex = idx;
        select.dispatchEvent(new Event('change', { bubbles: true }));
        select.dispatchEvent(new Event('input', { bubbles: true }));
      }
      menu.querySelectorAll('[aria-selected]').forEach(r => r.removeAttribute('aria-selected'));
      const row = menu.querySelector('.ds-select-option[data-idx="' + idx + '"]');
      if (row) row.setAttribute('aria-selected', 'true');
      syncBtn();
      close();
    }

    function open() {
      if (wrap.dataset.disabled === 'true') return;
      document.querySelectorAll('.ds-select-wrap[data-open="true"]').forEach(w => {
        if (w !== wrap) w.removeAttribute('data-open');
      });
      wrap.dataset.open = 'true';
      btn.setAttribute('aria-expanded', 'true');
      setActive(select.selectedIndex);
      const sel = menu.querySelector('[aria-selected="true"]');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    function close() {
      wrap.removeAttribute('data-open');
      btn.setAttribute('aria-expanded', 'false');
    }

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      wrap.dataset.open === 'true' ? close() : open();
    });

    btn.addEventListener('keydown', (e) => {
      const isOpen = wrap.dataset.open === 'true';
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (!isOpen) { open(); return; }
        const activeEl = menu.querySelector('[data-active="true"]');
        const cur = activeEl ? parseInt(activeEl.dataset.idx, 10) : select.selectedIndex;
        const next = e.key === 'ArrowDown'
          ? Math.min(cur + 1, select.options.length - 1)
          : Math.max(cur - 1, 0);
        setActive(next);
        const nextEl = menu.querySelector('.ds-select-option[data-idx="' + next + '"]');
        if (nextEl) nextEl.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter' || e.key === ' ') {
        if (isOpen) {
          e.preventDefault();
          const activeEl = menu.querySelector('[data-active="true"]');
          const cur = activeEl ? parseInt(activeEl.dataset.idx, 10) : select.selectedIndex;
          pick(cur);
        } else if (e.key === ' ') {
          e.preventDefault(); open();
        }
      } else if (e.key === 'Escape') {
        if (isOpen) { e.preventDefault(); close(); }
      } else if (e.key === 'Tab') {
        if (isOpen) close();
      } else if (e.key.length === 1 && /\S/.test(e.key)) {
        const ch = e.key.toLowerCase();
        const start = (select.selectedIndex + 1) % select.options.length;
        for (let i = 0; i < select.options.length; i++) {
          const idx = (start + i) % select.options.length;
          if (select.options[idx].textContent.trim().toLowerCase().startsWith(ch)) {
            if (!isOpen) open();
            setActive(idx);
            break;
          }
        }
      }
    });

    document.addEventListener('click', (e) => {
      if (wrap.dataset.open !== 'true') return;
      if (!wrap.contains(e.target)) close();
    });

    select.parentNode.insertBefore(wrap, select);
    wrap.append(select, btn, menu);

    buildMenu();
    syncBtn();

    select.addEventListener('change', () => {
      syncBtn();
      menu.querySelectorAll('[aria-selected]').forEach(r => r.removeAttribute('aria-selected'));
      const row = menu.querySelector('.ds-select-option[data-idx="' + select.selectedIndex + '"]');
      if (row) row.setAttribute('aria-selected', 'true');
    });
  }

  function scan(root) {
    (root || document).querySelectorAll('select.ds-select:not([data-dss-enhanced])').forEach(enhance);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => scan());
  } else {
    scan();
  }

  const mo = new MutationObserver(muts => {
    muts.forEach(m => {
      m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        if (n.matches && n.matches('select.ds-select')) enhance(n);
        else scan(n);
      });
    });
  });
  mo.observe(document.documentElement, { childList: true, subtree: true });

  window.dsSelect = { enhance, scan };
})();
</script>
