{% extends "base.html" %}
{% block title %}{% if item %}Edit{% else %}New{% endif %} Partner — DS-MOZ Connect{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if item %}Edit Partner{% else %}New Partner{% endif %}</h1>
  <a href="/admin/partners" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:640px">
  <form method="post" action="/admin/partners/{% if item %}{{ item.id }}/edit{% else %}new{% endif %}">
    <div class="form-group">
      <label class="form-label" for="name">Partner Name <span style="color:var(--danger)">*</span></label>
      <input type="text" id="name" name="name" class="form-control" required value="{{ item.name if item else '' }}">
    </div>
    <div class="form-group">
      <label class="form-label" for="logo_url">Logo URL (Cloudflare Images)</label>
      <input type="url" id="logo_url" name="logo_url" class="form-control" value="{{ item.logo_url or '' if item else '' }}" placeholder="https://imagedelivery.net/...">
      <div class="form-hint">Leave empty to show a pill with the partner name instead.</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="website_url">Website URL</label>
      <input type="url" id="website_url" name="website_url" class="form-control" value="{{ item.website_url or '' if item else '' }}" placeholder="https://example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="sort_order">Sort Order</label>
      <input type="number" id="sort_order" name="sort_order" class="form-control" value="{{ item.sort_order if item else 0 }}">
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:0.5rem">
      <input type="checkbox" id="is_active" name="is_active" value="on" {% if not item or item.is_active %}checked{% endif %}>
      <label for="is_active" style="margin:0;font-weight:500">Active (show on landing page)</label>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">{% if item %}Save Changes{% else %}Create{% endif %}</button>
      <a href="/admin/partners" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
