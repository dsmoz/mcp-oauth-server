<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — DS-MOZ Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: #FAF6F4;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  background: #FFFFFF;
  border: 1px solid rgba(7,43,49,0.10);
  border-radius: 4px;
  padding: 36px 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 1px 2px rgba(7,43,49,0.06), 0 4px 12px rgba(7,43,49,0.05);
}
.brand {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #FF5E00;
  margin-bottom: 24px;
}
h1 {
  font-family: 'Raleway', sans-serif;
  font-size: 22px; font-weight: 700;
  color: #072B31;
  margin-bottom: 6px;
}
.subtitle { font-size: 14px; color: #6B7E81; margin-bottom: 24px; line-height: 1.55; }
.form-group { margin-bottom: 16px; }
label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: #2A4449; }
input[type="password"] {
  width: 100%;
  padding: 10px 12px;
  background: #FFFFFF;
  border: 1px solid rgba(7,43,49,0.20);
  border-radius: 4px;
  color: #072B31;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus { border-color: #115E67; box-shadow: 0 0 0 3px rgba(17,94,103,0.08); }
.alert {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 16px;
}
.alert.danger { background: rgba(185,28,28,0.08); color: #B91C1C; }
.btn-submit {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px 16px;
  background: #FF5E00;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Raleway', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 8px;
}
.btn-submit:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">DS&#8209;MOZ Connect</div>
  <h1>Set New Password</h1>
  <p class="subtitle">Choose a strong password for your portal account.</p>

  {% if error %}
  <div class="alert danger">{{ error }}</div>
  {% endif %}

  <form method="post" action="/portal/reset-password">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="form-group">
      <label for="password">New password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" autofocus minlength="8">
    </div>
    <div class="form-group">
      <label for="password_confirm">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="btn-submit">Set New Password &rarr;</button>
  </form>
</div>
</body>
</html>
