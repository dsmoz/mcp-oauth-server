<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Account — DS-MOZ Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: #FAF6F4;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  background: #FFFFFF;
  border: 1px solid rgba(7,43,49,0.10);
  border-radius: 4px;
  padding: 36px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 1px 2px rgba(7,43,49,0.06), 0 4px 12px rgba(7,43,49,0.05);
}
.brand {
  font-family: 'Raleway', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #FF5E00;
  margin-bottom: 24px;
}
h1 {
  font-family: 'Raleway', sans-serif;
  font-size: 22px; font-weight: 700;
  color: #072B31;
  margin-bottom: 6px;
}
.subtitle { font-size: 14px; color: #6B7E81; margin-bottom: 24px; line-height: 1.55; }
.form-group { margin-bottom: 16px; }
label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: #2A4449; }
.hint { font-size: 11px; color: #6B7E81; margin-top: 4px; display: block; }
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 10px 12px;
  background: #FFFFFF;
  border: 1px solid rgba(7,43,49,0.20);
  border-radius: 4px;
  color: #072B31;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus { border-color: #115E67; box-shadow: 0 0 0 3px rgba(17,94,103,0.08); }
.username-status { font-size: 11px; margin-top: 4px; display: block; min-height: 14px; }
.username-status.available { color: #086d4f; }
.username-status.taken { color: #B91C1C; }
.username-status.checking { color: #6B7E81; }
.alert {
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 16px;
}
.alert.danger { background: rgba(185,28,28,0.08); color: #B91C1C; }
.btn-submit {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px 16px;
  background: #FF5E00;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Raleway', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 8px;
}
.btn-submit:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">DS&#8209;MOZ Connect</div>
  <h1>Set Up Your Account</h1>
  <p class="subtitle">Choose a username and password for your client portal.</p>

  {% if error %}
  <div class="alert danger">{{ error }}</div>
  {% endif %}

  <form method="post" action="/portal/setup-password" id="setup-form">
    <input type="hidden" name="token" value="{{ token }}">
    <input type="hidden" id="client-id" value="{{ client_id }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             value="{{ username }}" autofocus pattern="^\S+$" title="No spaces allowed">
      <span class="username-status" id="username-status"></span>
      <span class="hint">No spaces. You can also log in with your email.</span>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password">
      <span class="hint">Minimum 8 characters.</span>
    </div>
    <div class="form-group">
      <label for="password_confirm">Confirm password</label>
      <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn-submit">Create Account &rarr;</button>
  </form>
</div>
<script>
  const usernameInput = document.getElementById('username');
  const statusEl = document.getElementById('username-status');
  const clientId = document.getElementById('client-id').value;
  let debounceTimer;

  usernameInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const val = usernameInput.value.trim();
    if (!val) { statusEl.textContent = ''; statusEl.className = 'username-status'; return; }
    if (/\s/.test(val)) { statusEl.textContent = 'No spaces allowed'; statusEl.className = 'username-status taken'; return; }
    statusEl.textContent = 'Checking…';
    statusEl.className = 'username-status checking';
    debounceTimer = setTimeout(async () => {
      try {
        const res = await fetch(`/portal/check-username?username=${encodeURIComponent(val)}&exclude_client_id=${encodeURIComponent(clientId)}`);
        const data = await res.json();
        if (data.available) {
          statusEl.textContent = '✓ Available';
          statusEl.className = 'username-status available';
        } else {
          statusEl.textContent = '✗ Already taken';
          statusEl.className = 'username-status taken';
        }
      } catch { statusEl.textContent = ''; statusEl.className = 'username-status'; }
    }, 400);
  });
</script>
</body>
</html>
